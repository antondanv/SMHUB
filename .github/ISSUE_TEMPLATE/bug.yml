name: Bug
description: Ошибка, регрессия или поломка сценария
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Что сломано
      placeholder: Коротко опишите баг
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть ...
        2. Нажать ...
        3. Получить ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Контекст
      description: Ветка, окружение, логи, скриншоты
